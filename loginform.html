<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>لاگ ان فارم - Solangi Connect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'solangi-dark': '#166534',
            'solangi-accent': '#22c55e',
            'mint-bg': '#f0fdfa',
            'mint-card': '#ffffff',
            'mint-border': '#d1fae5'
          },
          fontFamily: {
            'urdu': ['Noto Nastaliq Urdu', 'serif'],
            'jakarta': ['Plus Jakarta Sans', 'sans-serif']
          }
        }
      }
    }
  </script>

  <style>
    body {
      font-family: 'Noto Nastaliq Urdu', 'Plus Jakarta Sans', system-ui, sans-serif;
      background: #f0fdfa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .login-card {
      background: white;
      border-radius: 1.5rem;
      box-shadow: 0 20px 40px rgba(34, 197, 94, 0.08);
      border: 1px solid #d1fae5;
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem;
      text-align: center;
    }
    .heading-main {
      font-size: 2.8rem;
      line-height: 1;
      font-weight: 700;
      color: #166534;
      margin-bottom: 0.5rem;
    }
    .heading-sub {
      font-size: 1.05rem;
      color: #4b5563;
      margin-bottom: 2rem;
    }
    .input-wrapper {
      margin-bottom: 2rem;
      text-align: right;
    }
    label {
      display: block;
      margin-bottom: 0.6rem;
      font-size: 1.1rem;
      font-weight: 600;
      color: #1f2937;
    }
    input {
      width: 100%;
      padding: 1rem 3.5rem 1rem 1.25rem;  /* دائیں طرف eye کے لیے extra padding */
      border: 1px solid #cbd5e1;
      border-radius: 1rem;
      font-size: 1rem;
      background: #f9fafb;
      transition: all 0.2s ease;
      text-align: right;
      direction: rtl;
    }
    input:focus {
      border-color: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.15);
      background: white;
      outline: none;
    }
    .password-wrapper {
      position: relative;
    }
    .eye-btn {
      position: absolute;
      left: 1rem;           /* RTL میں دائیں طرف */
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      cursor: pointer;
      color: #6b7280;
      padding: 0;
      z-index: 10;
    }
    .extra-links {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 1.5rem 0 2rem 0;
      font-size: 0.95rem;
      color: #374151;
    }
    .btn-login {
      width: 100%;
      padding: 1.1rem;
      background: linear-gradient(to right, #166534, #22c55e);
      color: white;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 1rem;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(34, 197, 94, 0.3);
    }
    .register-link {
      text-align: center;
      margin-top: 1.5rem;
      color: #4b5563;
      font-size: 1rem;
    }
    .register-link a {
      color: #166534;
      font-weight: bold;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="login-card">

    <!-- Heading -->
    <div class="text-center mb-10">
      <h1 class="heading-main font-bold text-solangi-dark urdu-text">
        لاگ ان ڪريو
      </h1>
      <p class="heading-sub urdu-text">
        اپنھنجو اڪائونٽ استعمال ڪريو
      </p>
    </div>

    <!-- Form -->
    <form id="loginForm">

      <!-- Email or Phone -->
      <div class="input-wrapper">
        <label class="urdu-text">
          ای میل یا فون نمبر <span class="text-red-500">*</span>
        </label>
        <input 
          type="text" 
          id="identifier" 
          placeholder="example@email.com|aurangzaib_solangi"
          required 
        />
      </div>

      <!-- Password -->
      <div class="input-wrapper">
        <label class="urdu-text">
         پاسورڊ يا نمبر داخل ڪريو<span class="text-red-500 ">*</span>
        </label>
        <div class="password-wrapper">
          <input 
            type="password" 
            id="credential" 
            placeholder="پاسورڊ داخل ڪريو"
            required 
          />
          <button 
            type="button" 
            onclick="toggleCredentialVisibility()"
            class="eye-btn"
          >
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
          </button>
        </div>
        <p class="text-sm text-gray-600 mt-2.5 text-right urdu-text">
          پاسورڊ وساري ويٺا آهيو؟ ته فون نمبر استعمال ڪريو
        </p>
      </div>

      <!-- Remember & Forgot -->
      <div class="extra-links">
        <label class="flex items-center cursor-pointer">
          <input type="checkbox" class="w-5 h-5 accent-solangi-accent rounded ml-2">
          <span class="urdu-text">ياد رکو</span>
        </label>
        <a href="#" class="text-solangi-accent hover:underline urdu-text">پاسورڊ وساري ڇڏيو؟</a>
      </div>

      <!-- Login Button -->
      <button type="submit" class="btn-login urdu-text">
        لاگ ان ڪريو
      </button>

      <!-- Register Link -->
      <div class="register-link urdu-text">
       اڪائونٽ ناهي؟
        <a href="registration.html">ھاڻي رجسٽر ڪريو</a>
      </div>

    </form>
  </div>

  <script>
    function toggleCredentialVisibility() {
      const input = document.getElementById('credential');
      const eyeIcon = document.getElementById('eyeIcon');

      if (input.type === 'password') {
        input.type = 'text';
        eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />';
      } else {
        input.type = 'password';
        eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
      }
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert("لاگ ان کوشش شروع ہو گئی!   ");
    });
  </script>
</body>
</html>
